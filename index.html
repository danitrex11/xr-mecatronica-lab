<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Paletizadora XR Realista</title>

  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.1/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-environment-component@1.3.4/dist/aframe-environment-component.min.js"></script>
</head>

<body>

<a-scene renderer="colorManagement: true; physicallyCorrectLights: true">

  <!-- ========================= -->
  <!-- ASSETS -->
  <!-- ========================= -->
  <a-assets>
    <a-asset-item id="paletizadora" src="models/paletizadora.glb"></a-asset-item>
  </a-assets>

  <!-- ========================= -->
  <!-- ENTORNO (CLAVE PARA REALISMO) -->
  <!-- ========================= -->
  <a-entity environment="
    preset: warehouse;
    lighting: point;
    shadow: true;
    ground: flat;
    groundColor: #555;
    grid: none">
  </a-entity>

  <!-- ========================= -->
  <!-- LUCES -->
  <!-- ========================= -->
  <a-light type="ambient" intensity="0.5"></a-light>

  <a-light 
    type="directional"
    position="5 10 5"
    intensity="1.5"
    castShadow="true">
  </a-light>

  <a-light
    type="directional"
    position="-5 6 -5"
    intensity="1">
  </a-light>

  <!-- ========================= -->
  <!-- MODELO -->
  <!-- ========================= -->
  <a-entity
    gltf-model="#paletizadora"
    position="0 0 -4"
    rotation="0 180 0"
    scale="0.03 0.03 0.03"
    shadow="cast: true; receive: true">
  </a-entity>

  <!-- ========================= -->
  <!-- CÁMARA -->
  <!-- ========================= -->
  <a-entity position="0 1.6 2">
    <a-camera
      wasd-controls="acceleration: 20"
      look-controls="pointerLockEnabled: true">
    </a-camera>
  </a-entity>

</a-scene>

</body>
</html>
