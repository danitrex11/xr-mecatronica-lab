<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>XR Paletizadora</title>

<script src="https://cdn.jsdelivr.net/npm/aframe@1.4.1/dist/aframe-master.min.js"></script>

</head>

<body>

<a-scene>

<!-- Cargar modelo -->
<a-assets>
<a-asset-item id="paletizadora" src="models/paletizadora.glb"></a-asset-item>
</a-assets>

<!-- Piso -->
<a-plane rotation="-90 0 0"
         width="20"
         height="20"
         color="#808080">
</a-plane>

<!-- Modelo industrial -->
<a-entity 
    gltf-model="#paletizadora"
    position="0 0 -5"
    rotation="0 0 0"
    scale="1 1 1">
</a-entity>

<!-- Luz -->
<a-light type="ambient" intensity="0.8"></a-light>

<a-light
    type="directional"
    position="2 4 3"
    intensity="0.6">
</a-light>

<!-- Cielo -->
<a-sky color="#ECECEC"></a-sky>

</a-scene>

</body>
</html>
