<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Paletizadora XR</title>

  <!-- A-Frame estable -->
  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>

  <!-- Environment (para realismo) -->
  <script src="https://cdn.jsdelivr.net/npm/aframe-environment-component@1.3.4/dist/aframe-environment-component.min.js"></script>
</head>

<body>

<a-scene 
  renderer="colorManagement: true; physicallyCorrectLights: true; exposure: 1.8">
  background="color: #ECECEC">

  <!-- ========================= -->
  <!-- ASSETS -->
  <!-- ========================= -->
  <a-assets>
    <a-asset-item id="paletizadora" src="models/paletizadora.glb"></a-asset-item>
  </a-assets>

  <!-- ========================= -->
  <!-- ENTORNO (CLAVE PARA COLOR) -->
  <!-- ========================= -->
 <a-entity environment="
  preset: forest;
  lighting: distant;
  ground: flat;
  groundColor: #888;
  shadow: true">
</a-entity>
  <!-- ========================= -->
  <!-- LUCES SUAVES -->
  <!-- ========================= -->
  <a-light type="ambient" intensity="0.9"></a-light>

<a-light 
  type="directional"
  position="5 10 5"
  intensity="2"
  castShadow="true">
</a-light>

<a-light
  type="directional"
  position="-5 6 -5"
  intensity="1.2">
</a-light>

  <!-- ========================= -->
  <!-- MODELO (SIN FORZAR COLOR) -->
  <!-- ========================= -->
<a-entity
  gltf-model="#paletizadora"
  position="0 0 -4"
  rotation="0 180 0"
  scale="0.03 0.03 0.03"
  shadow="cast: true; receive: true"
  material="roughness: 0.5; metalness: 0.3">
</a-entity>

  <!-- ========================= -->
  <!-- CÁMARA -->
  <!-- ========================= -->
  <a-entity position="0 1.6 2">
    <a-camera 
      wasd-controls="acceleration: 20"
      look-controls="pointerLockEnabled: true">
    </a-camera>
  </a-entity>

</a-scene>

</body>
</html>
