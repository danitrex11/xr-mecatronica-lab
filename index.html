<!DOCTYPE html>

<html>

<head>
<meta charset="utf-8">
<title>Paletizadora XR</title>

<script src="https://cdn.jsdelivr.net/npm/aframe@1.4.1/dist/aframe-master.min.js"></script>

</head>

<body>

<a-scene background="color: #ECECEC">

<!-- ========================= -->

<!-- CARGAR MODELO -->

<!-- ========================= -->

<a-assets>
<a-asset-item id="paletizadora" src="models/paletizadora.glb"></a-asset-item>
</a-assets>

<!-- ========================= -->

<!-- ILUMINACIÓN -->

<!-- ========================= -->

<a-light type="ambient" intensity="1"></a-light>

<a-light 
 type="directional"
 position="5 10 5"
 intensity="1.2"> </a-light>

<a-light
 type="directional"
 position="-5 6 -5"
 intensity="0.8"> </a-light>

<!-- ========================= -->

<!-- PISO -->

<!-- ========================= -->

<a-plane
rotation="-90 0 0"
width="50"
height="50"
color="#777777"> </a-plane>

<!-- ========================= -->

<!-- MODELO -->

<!-- ========================= -->

<a-entity
 gltf-model="#paletizadora"
 position="0 -1 -4"
 rotation="0 180 0"
 scale="0.03 0.03 0.03"> </a-entity>

<!-- ========================= -->

<!-- CÁMARA VR -->

<!-- ========================= -->

<a-entity position="0 1.6 0">

<a-camera
wasd-controls-enabled="true"
look-controls="pointerLockEnabled: true"> </a-camera>

</a-entity>

<!-- ========================= -->

<!-- CIELO -->

<!-- ========================= -->

<a-sky color="#DDDDDD"></a-sky>

</a-scene>

</body>
</html>
