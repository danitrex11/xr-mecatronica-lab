<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Estación de Enlatado PRO</title>

  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
</head>

<body>
<a-scene renderer="physicallyCorrectLights: true" background="color: #eaeaea">

  <!-- ========================= -->
  <!-- ILUMINACIÓN PRO -->
  <!-- ========================= -->
  <a-light type="ambient" intensity="0.6"></a-light>

  <a-light 
    type="directional" 
    position="5 10 5" 
    intensity="1.5"
    castShadow="true">
  </a-light>

  <!-- ========================= -->
  <!-- FONDO TIPO ESTUDIO -->
  <!-- ========================= -->
  <a-plane rotation="-90 0 0" width="40" height="40" color="#d9d9d9"></a-plane>
  <a-plane position="0 10 -20" width="40" height="20" color="#f5f5f5"></a-plane>

  <!-- ========================= -->
  <!-- BANDA TRANSPORTADORA -->
  <!-- ========================= -->
  <a-box 
  position="0 0.35 -4" 
  rotation="0 90 0"
  geometry="primitive: box; depth: 10; height: 0.3; width: 1.6" 
  material="color: #2b2b2b; roughness: 0.7">
  </a-box>


  <!-- ========================= -->
  <!-- RODILLOS -->
  <!-- ========================= -->
  <a-cylinder position="-4.5 0.35 -4" radius="0.25" height="1.6" rotation="0 0 90"
    material="metalness: 0.9; roughness: 0.2; color: #888"></a-cylinder>

  <a-cylinder position="4.5 0.35 -4" radius="0.25" height="1.6" rotation="0 0 90"
    material="metalness: 0.9; roughness: 0.2; color: #888"></a-cylinder>

  <!-- ========================= -->
  <!-- ESTRUCTURA -->
  <!-- ========================= -->
<a-entity position="0 0 0" rotation="0 90 0">

  <!-- Superficie -->
  <a-box position="0 2 -4" width="3" height="0.2" depth="1.5" color="#666"></a-box>

  <!-- Patas -->
  <a-box position="-0.7 1 -4" width="0.2" height="2" depth="0.2" color="#777"></a-box>
  <a-box position="0.7 1 -4" width="0.2" height="2" depth="0.2" color="#777"></a-box>

</a-entity>
  <!-- ========================= -->
  <!-- TANQUE -->
  <!-- ========================= -->
  <a-cylinder 
    position="0 3 -4" 
    radius="0.7" height="1.3"
    material="color: #4fc3f7; metalness: 0.3; roughness: 0.2">
  </a-cylinder>

  <!-- Boquilla -->
  <a-cylinder position="0 2.2 -4" radius="0.08" height="0.9" color="#333"></a-cylinder>

  <!-- ========================= -->
  <!-- LATAS MÁS REALISTAS -->
  <!-- ========================= -->

  <a-cylinder 
    radius="0.22" height="0.5"
    position="-4 0.7 -4"
    material="metalness: 0.8; roughness: 0.3; color: #c0c0c0"
    animation="property: position; to: 4 0.7 -4; dur: 5000; loop: true">
  </a-cylinder>

  <a-cylinder 
    radius="0.22" height="0.5"
    position="-6 0.7 -4"
    material="metalness: 0.8; roughness: 0.3; color: #b0bec5"
    animation="property: position; to: 4 0.7 -4; dur: 5000; delay: 2000; loop: true">
  </a-cylinder>

  <a-cylinder 
    radius="0.22" height="0.5"
    position="-8 0.7 -4"
    material="metalness: 0.8; roughness: 0.3; color: #90a4ae"
    animation="property: position; to: 4 0.7 -4; dur: 5000; delay: 4000; loop: true">
  </a-cylinder>

  <!-- ========================= -->
  <!-- CÁMARA MEJOR POSICIONADA -->
  <!-- ========================= -->
  <a-entity position="0 1.6 5">
    <a-camera wasd-controls look-controls></a-camera>
  </a-entity>

</a-scene>
</body>
</html>
