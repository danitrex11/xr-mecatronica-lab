<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>Paletizadora XR</title>

<script src="https://cdn.jsdelivr.net/npm/aframe@1.4.1/dist/aframe-master.min.js"></script>

</head>

<body>

<a-scene>

<!-- Cargar modelo -->
<a-assets>
<a-asset-item id="paletizadora" src="models/paletizadora.glb"></a-asset-item>
</a-assets>

<!-- Piso industrial -->
<a-plane rotation="-90 0 0"
         width="40"
         height="40"
         color="#6f6f6f">
</a-plane>

<!-- Modelo -->
<a-entity 
    gltf-model="#paletizadora"
    position="0 0 -3"
    rotation="0 180 0"
    scale="0.03 0.03 0.03">
</a-entity>

<!-- Iluminación -->
<a-light type="ambient" intensity="0.9"></a-light>

<a-light 
    type="directional"
    position="5 10 5"
    intensity="0.7">
</a-light>

<!-- Cielo -->
<a-sky color="#E0E0E0"></a-sky>

<!-- Cámara VR -->
<a-entity position="0 1.6 0">
<a-camera wasd-controls-enabled="true"></a-camera>
</a-entity>

</a-scene>

</body>
</html>
